name: wisdom_quotes
description: "名言警句应用 - 经典名著、诗词、投资名言"
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  shared_preferences: ^2.3.4
  intl: ^0.20.1
  http: ^1.2.2
  share_plus: ^10.1.4
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/quotes_cn.json
    - assets/quotes_en.json
